services:

  # ─── Backend (Laravel 12 + Livewire 4 — monolito) ────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: maya_log_mgmt
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Log Management}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://maya_logs.localhost}
      APP_LOCALE: ${APP_LOCALE:-es}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-es}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-es_ES}
      # ─── Base de datos (gestionada por infra/) ─────────────────
      DB_CONNECTION: pgsql
      DB_HOST: maya_infra_postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-log_mgmt_db}
      DB_USERNAME: ${DB_USERNAME:-log_mgmt_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      # ─── Usuario panel (permisos mínimos, lectura) ─────────────
      DB_PANEL_USERNAME: ${DB_PANEL_USERNAME:-panel_user}
      DB_PANEL_PASSWORD: ${DB_PANEL_PASSWORD:-}
      # ─── Sesión / Cache / Queue ─────────────────────────────────
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
      # ─── Auth (gateway externo) ─────────────────────────────────
      AUTH_EXTERNAL_URL: ${AUTH_EXTERNAL_URL:-http://maya_auth_backend:8000}
      AUTH_EXTERNAL_PUBLIC_URL: ${AUTH_EXTERNAL_PUBLIC_URL:-http://maya_authorization.localhost}
      AUTH_MOCK_USER_ID: ${AUTH_MOCK_USER_ID:-1}
      # ─── Logging ────────────────────────────────────────────────
      LOG_CHANNEL: stack
      LOG_STACK: "daily,rabbit"
      LOG_LEVEL: debug
      LOG_RABBIT_LEVEL: warning
      # ─── RabbitMQ (broker compartido en maya_infra) ─────────────
      RABBITMQ_HOST: ${RABBITMQ_HOST:-maya_rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      MAYA_MESSAGING_APP: maya_logs
      # ─── Vite ───────────────────────────────────────────────────
      VITE_APP_NAME: ${APP_NAME:-Log Management}
    volumes:
      - .:/var/www/html
      - ../maya_infra/packages:/packages
      # composer.json usa "../packages/..." que desde WORKDIR /var/www/html resuelve a /var/www/packages.
      - ../maya_infra/packages:/var/www/packages
      - /var/www/html/vendor
      - /var/www/html/node_modules
    ports:
      - "${BACKEND_PORT:-8002}:8000"
      - "${VITE_PORT:-5176}:5173"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.log-mgmt.rule=Host(`maya_logs.localhost`)"
      - "traefik.http.routers.log-mgmt.entrypoints=web"
      - "traefik.http.services.log-mgmt.loadbalancer.server.port=8000"
    networks:
      - maya_network

  # ─── Worker: consumer AMQP logs.ingest → tabla logs ──────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: maya_log_mgmt_worker
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      APP_NAME: ${APP_NAME:-Log Management}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: maya_infra_postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-log_mgmt_db}
      DB_USERNAME: ${DB_USERNAME:-log_mgmt_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: database
      RABBITMQ_HOST: ${RABBITMQ_HOST:-maya_rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      MAYA_MESSAGING_APP: maya_logs
    # Override del ENTRYPOINT del Dockerfile (que hace exec php artisan serve
    # hardcoded e ignora CMD). Cada servicio tiene su propio volumen anonymous
    # para vendor/, asi que el worker instala sus deps tambien (rapido en el
    # segundo run porque composer cache de paquetes existe en la imagen).
    entrypoint:
      - /bin/sh
      - -c
      - |
        cd /var/www/html
        if [ ! -f vendor/autoload.php ]; then
          echo "[worker] vendor missing, running composer install..."
          composer install --optimize-autoloader --no-interaction --no-ansi
        fi
        echo "[worker] vendor ready — waiting for backend migrations (logs table)..."
        until php -r "exit(is_file('vendor/autoload.php') ? 0 : 1);" 2>/dev/null && \
              php artisan migrate:status --no-interaction 2>/dev/null | grep -q "create_logs_table"; do
          sleep 3
        done
        echo "[worker] migrations ready — starting logs:consume"
        exec php artisan logs:consume
    command: []
    volumes:
      - .:/var/www/html
      - ../packages:/packages
      # composer.json usa "../packages/..." que desde WORKDIR /var/www/html resuelve a /var/www/packages.
      - ../packages:/var/www/packages
      - /var/www/html/vendor
      - /var/www/html/node_modules
    networks:
      - maya_network

networks:
  maya_network:
    external: true
    name: maya_network
